name: Lean CI Setup
description: Install system dependencies, elan, and restore Lean/Lake caches for CI jobs.

runs:
  using: composite
  steps:
    - name: Install System Dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y clang lld curl

    - name: Install elan
      shell: bash
      run: |
        curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
        echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

    - name: Restore Lean Toolchain Cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.elan/toolchains
          ~/.elan/settings.toml
        key: ${{ runner.os }}-elan-${{ hashFiles('lean-toolchain') }}

    - name: Restore Lake Package Cache
      uses: actions/cache@v4
      with:
        path: .lake/packages
        key: ${{ runner.os }}-lake-packages-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}

    - name: Show Tool Versions
      shell: bash
      run: |
        elan --version
        lean --version
        lake --version
