name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Shell Lint
        run: bash scripts/lint-shell.sh

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/lean-ci-setup

      - name: Build
        run: lake build

      - name: Test
        run: bash tests/test.sh

  broker-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/lean-ci-setup

      - name: Broker Fast Test
        run: bash tests/test-broker-fast.sh

  broker-slow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/lean-ci-setup

      - name: Broker Slow Test
        run: bash tests/test-broker-slow.sh

  broker-rocq:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/lean-ci-setup

      - name: Set up OCaml / opam
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 4.14.2

      - name: Install Rocq Tooling
        run: bash tests/setup-rocq-opam.sh

      - name: Broker Rocq Test
        run: bash tests/test-broker-rocq.sh
